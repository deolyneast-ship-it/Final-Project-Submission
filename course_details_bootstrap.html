<h1>{{ course.name }}</h1>

<div class="container">
    {% for lesson in course.lesson_set.all %}
    <div class="card">
        <div class="card-header">
            {{ lesson.title }}
        </div>
        <div class="card-body">
            {{ lesson.content }}
        </div>
    </div>
    {% endfor %}
</div>
